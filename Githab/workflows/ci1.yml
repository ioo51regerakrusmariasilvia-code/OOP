name: Java Lab1 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/actions-setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download JUnit Platform Console Standalone
      run: |
        wget https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.0/junit-platform-console-standalone-1.10.0.jar -O junit-platform-standalone.jar

    - name: Compile Source and Tests
      run: |
        javac -cp junit-platform-standalone.jar Lab1.java Lab1Test.java

    - name: Run JUnit Tests
      run: |
        java -jar junit-platform-standalone.jar --class-path . --select-class Lab1Test
